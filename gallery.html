<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой красавчик</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><path fill="%235a6bff" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 12 12, auto; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #d4e4f7 0%, #c5d9f0 100%);
    padding-bottom: 70px;
  }
  .title {
    text-align: center;
    padding: 50px 20px 30px;
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    background: linear-gradient(135deg, #2c3e6e, #5a6bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
    margin: 80px 10%;
    padding: 20px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(4px);
    border-radius: 48px;
    transition: 0.6s;
    opacity: 0;
    transform: translateY(70px);
  }
  .row.show { opacity: 1; transform: translateY(0); }
  .row:nth-child(even) { flex-direction: row-reverse; }
  .polaroid {
    background: white;
    padding: 15px 15px 25px 15px;
    border-radius: 12px;
    box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    transform: rotate(-2deg);
    transition: 0.3s;
    text-align: center;
  }
  .polaroid img {
    width: 240px;
    height: 280px;
    object-fit: cover;
    border-radius: 8px;
    display: block;
  }
  .caption {
    margin-top: 12px;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #333;
  }
  .text {
    font-size: 24px;
    font-weight: 500;
    color: #2c3e6e;
    max-width: 400px;
  }
  button {
    display: block;
    margin: 40px auto;
    padding: 14px 38px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #5a6bff, #8aa0ff);
    color: white;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
</head>
<body>
<h1 class="title">Мой красавчик 💙</h1>

<div class="row"><div class="polaroid"><img src="photo1.jpg"><div class="caption">❤️ ты смешной</div></div><div class="text">я люблю тебя когда ты смешной</div></div>
<div class="row"><div class="polaroid"><img src="photo2.jpg"><div class="caption">💙 ты умный</div></div><div class="text">я люблю тебя когда ты умный</div></div>
<div class="row"><div class="polaroid"><img src="photo3.jpg"><div class="caption">💜 ты горячий</div></div><div class="text">я люблю тебя когда ты горячий</div></div>
<div class="row"><div class="polaroid"><img src="photo4.jpg"><div class="caption">💖 всегда</div></div><div class="text">я люблю тебя всегда</div></div>

<button onclick="location.href='you.html'">Дальше 💜</button>

<script>
  const rows = document.querySelectorAll('.row');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('show'); });
  }, { threshold: 0.2 });
  rows.forEach(r => observer.observe(r));
</script>

<script src="music.js"></script>
</body>
</html>
