<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сюрприз 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><path fill="%235a6bff" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 12 12, auto; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #d4e4f7 0%, #c5d9f0 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .glass-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(14px);
    border-radius: 56px;
    padding: 50px 60px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.5);
    max-width: 85%;
    animation: scaleGlow 1s ease-out;
  }
  @keyframes scaleGlow {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    background: linear-gradient(135deg, #2c3e6e, #5a6bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p {
    font-size: 20px;
    color: #2c3e6e;
    margin: 18px 0;
    font-weight: 500;
  }
  button {
    margin-top: 20px;
    padding: 12px 35px;
    border-radius: 60px;
    background: linear-gradient(135deg, #5a6bff, #8aa0ff);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
  }
  .music-btn {
    margin-top: 20px;
    background: rgba(90,107,255,0.2);
    color: #5a6bff;
    font-size: 16px;
  }
  .flying-item {
    position: absolute;
    pointer-events: none;
    font-size: 26px;
    animation: floatUp 4s linear forwards;
    z-index: 5;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(0.8); }
    100% { opacity: 0; transform: translateY(-180px) scale(1.3); }
  }
</style>
</head>
<body>
<div class="glass-card">
  <h1>Я создала этот сайт сама для тебя 💙</h1>
  <p>Ты для меня очень важен 💜</p>
  <button onclick="location.href='about.html'">✨ Дальше ✨</button>
  <br>
  <button class="music-btn" id="startMusicBtn">🎵 Включить музыку</button>
</div>

<script src="music.js"></script>
<script>
  document.getElementById('startMusicBtn').onclick = () => {
    playGlobalMusic();
    document.getElementById('startMusicBtn').innerText = '🎵 Музыка играет';
    document.getElementById('startMusicBtn').disabled = true;
  };

  function createFlying(emoji) {
    let el = document.createElement('div');
    el.className = 'flying-item';
    el.innerText = emoji;
    el.style.left = Math.random() * 100 + '%';
    el.style.bottom = '10%';
    el.style.animationDuration = 3 + Math.random() * 2 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
  setInterval(() => createFlying('💋'), 500);
  setInterval(() => createFlying('💙'), 600);
</script>
</body>
</html>
