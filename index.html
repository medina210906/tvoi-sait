<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сюрприз 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><path fill="%235a6bff" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 12 12, auto; }
  body {
    background: linear-gradient(135deg, #d4e4f7 0%, #c5d9f0 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
  .glass-card {
    text-align: center;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    padding: 50px 60px;
    border: 1px solid rgba(255,255,255,0.5);
    animation: floatIn 1.2s ease;
  }
  @keyframes floatIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    background: linear-gradient(135deg, #2c3e6e, #5a6bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  button {
    margin-top: 30px;
    padding: 14px 38px;
    border-radius: 60px;
    background: linear-gradient(135deg, #5a6bff, #8aa0ff);
    color: white;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    border: none;
  }
  .falling-gift {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    animation: fallLinear 5s linear forwards;
  }
  @keyframes fallLinear {
    0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120vh) rotate(360deg); opacity: 0.2; }
  }
</style>
</head>
<body>
<div class="glass-card">
  <h1>У меня есть для тебя сюрприз 💜</h1>
  <button onclick="location.href='surprise.html'">✨ Открыть ✨</button>
</div>
<script>
  const icons = ['🎁', '💜', '💙', '✨'];
  for(let i = 0; i < 25; i++) {
    let gift = document.createElement('div');
    gift.className = 'falling-gift';
    gift.innerHTML = icons[Math.floor(Math.random() * icons.length)];
    gift.style.left = Math.random() * 100 + '%';
    gift.style.fontSize = (Math.random() * 20 + 22) + 'px';
    gift.style.animationDuration = (Math.random() * 4 + 4) + 's';
    gift.style.animationDelay = Math.random() * 3 + 's';
    document.body.appendChild(gift);
  }
</script>
</body>
</html>
