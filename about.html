<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>О тебе</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><path fill="%235a6bff" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 12 12, auto; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #d4e4f7 0%, #c5d9f0 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
  }
  .card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    padding: 40px 50px;
    text-align: center;
    max-width: 800px;
    width: 100%;
  }
  h2 { font-family: 'Playfair Display', serif; font-size: 44px; color: #5a6bff; }
  p { font-size: 20px; color: #2c3e6e; margin: 15px 0; }
  .counter { background: #e0e7ff; border-radius: 30px; padding: 15px; margin: 20px 0; font-weight: bold; }
  .calendar {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    position: relative;
  }
  .cloud {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin: 30px 0;
  }
  .cloud span {
    background: #ffffffaa;
    backdrop-filter: blur(4px);
    padding: 8px 18px;
    border-radius: 50px;
    font-weight: 600;
    color: #5a6bff;
    animation: floatTag 3s infinite alternate;
  }
  @keyframes floatTag {
    from { transform: translateY(0px); }
    to { transform: translateY(-10px); }
  }
  button {
    margin-top: 20px;
    padding: 12px 34px;
    border-radius: 40px;
    background: linear-gradient(135deg, #5a6bff, #8aa0ff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }
  .firework-burst {
    position: fixed;
    pointer-events: none;
    font-size: 28px;
    animation: pop 0.5s ease-out forwards;
    z-index: 100;
  }
  @keyframes pop {
    0% { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
  }
</style>
</head>
<body>
<div class="card">
  <h2>О тебе 💜</h2>
  <p>Ты полностью поменял мою жизнь и ты навсегда останешься со мной</p>
  <p>С тобой тепло и спокойно</p>
  <p>Я тебя очень люблю</p>

  <div class="counter" id="counter"></div>

  <div class="calendar" id="birthdayCalendar">
    📅 Нажми на дату, чтобы перелистнуть годы 📅
    <div id="calendarDisplay" style="font-size: 28px; margin-top: 15px; font-weight: bold;">07.04.2021</div>
  </div>

  <div class="cloud">
    <span>💙 Любимый</span><span>💜 Родной</span><span>✨ Смешной</span>
    <span>🌟 Заботливый</span><span>💖 Милый</span><span>🔥 Сильный</span><span>❤️ Мой кислород</span>
  </div>

  <button onclick="location.href='gallery.html'">Дальше 💜</button>
</div>

<script>
  const startDate = new Date(2020, 8, 2);
  const today = new Date();
  const diffDays = Math.ceil((today - startDate) / (1000 * 60 * 60 * 24));
  const hisBDs = [2021,2022,2023,2024,2025,2026].filter(y => new Date(y, 3, 7) <= today).length;
  document.getElementById('counter').innerHTML = `💑 Мы вместе <span style="color:#5a6bff;">${diffDays}</span> дней<br>🎂 Вместе встретили <span style="color:#5a6bff;">${hisBDs}</span> твоих дней рождений`;

  const years = [2021,2022,2023,2024,2025,2026];
  let idx = 0;
  const calDiv = document.getElementById('calendarDisplay');
  const calendarBox = document.getElementById('birthdayCalendar');

  function showFirework() {
    for(let i = 0; i < 12; i++) {
      let f = document.createElement('div');
      f.className = 'firework-burst';
      f.innerText = ['🎆', '✨', '💥', '🎇'][Math.floor(Math.random() * 4)];
      f.style.left = (Math.random() * 80 + 10) + '%';
      f.style.top = (Math.random() * 80 + 10) + '%';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 500);
    }
  }

  calendarBox.onclick = () => {
    if(idx < years.length) {
      showFirework();
      idx++;
      if(idx < years.length) {
        calDiv.innerText = `07.04.${years[idx]}`;
      } else {
        calDiv.innerText = '🎉 Много-много счастливых лет вместе! 🎉';
        calendarBox.style.opacity = '0.7';
      }
    }
  };
</script>

<script src="music.js"></script>
</body>
</html>
