<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Это всё 💜</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><path fill="%235a6bff" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 12 12, auto;
  }
  body {
    background: linear-gradient(135deg, #d4e4f7 0%, #c5d9f0 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', 'Montserrat', sans-serif;
    position: relative;
    overflow: hidden;
  }
  .center-text {
    text-align: center;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    padding: 70px 90px;
    border-radius: 80px;
    z-index: 10;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    animation: fadeZoom 1s ease;
  }
  @keyframes fadeZoom {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  h1 {
    font-size: 64px;
    background: linear-gradient(135deg, #2c3e6e, #5a6bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  button {
    margin-top: 40px;
    padding: 14px 45px;
    border: none;
    border-radius: 60px;
    background: linear-gradient(135deg, #5a6bff, #8aa0ff);
    color: white;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #5a6bff;
  }
  .floating-heart {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    animation: floatUpHeart 4s linear forwards;
    z-index: 5;
  }
  @keyframes floatUpHeart {
    0% {
      opacity: 1;
      transform: translateY(0) scale(0.8);
    }
    100% {
      opacity: 0;
      transform: translateY(-200px) scale(1.4);
    }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="center-text">
  <h1>✨ Это всё ✨</h1>
  <p style="margin-top: 30px; font-size: 20px; color: #2c3e6e;">❤️ спасибо, что ты есть ❤️</p>
  <button onclick="location.href='index.html'">🔄 Начать заново 🔄</button>
</div>

<script>
  const hearts = ['💜', '💙', '💖', '💗', '❤️', '🧡', '💛', '💚'];
  setInterval(() => {
    let heart = document.createElement('div');
    heart.className = 'floating-heart';
    heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.bottom = '-30px';
    heart.style.fontSize = (Math.random() * 24 + 20) + 'px';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
</script>
<script src="music.js"></script>
<script>
    initGlobalMusic();
    // Пробуем включить музыку при первом клике
    document.body.addEventListener('click', function once() {
        playGlobalMusic();
        document.body.removeEventListener('click', once);
    }, { once: true });
</script>
<script src="music.js"></script>
</body>
</html>
